volumes:
  vaultwarden-data:
    name: vaultwarden-data
  backup-local-borg:
    name: backup-local-borg

services:
  borg-backup:
    build: .
    container_name: debian_container
    hostname: Debian
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
      - BORG_PASSPHRASE=${BORG_PASSPHRASE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_TO=${SMTP_TO}
      - SMTP_PORT=${SMTP_PORT}
    volumes:
      - vaultwarden-data:/volumes/vaultwarden-data
      - backup-local-borg:/volumes/backup-local-borg

      - /etc/localtime:/etc/localtime:ro

      - ./scripts:/scripts

      - ./rclone_config:/root/.config/rclone
      - ./config/supercronic.conf:/etc/cron.d/supercronic.conf
      - ./config/logrotate.conf:/etc/logrotate.conf
      - ./config.yaml:/etc/borgmatic/config.yaml

      - ./borg-keys:/volumes/borg-keys

    entrypoint: ["/bin/sh", "/scripts/bootstrap.sh"]
